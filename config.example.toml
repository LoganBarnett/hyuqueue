# hyuqueue configuration example
#
# Searched in order:
#   1. --config / $CONFIG_FILE        (explicit)
#   2. ./config.toml                  (working directory)
#   3. $XDG_CONFIG_HOME/hyuqueue/config.toml
#      (default: ~/.config/hyuqueue/config.toml)

# Logging
log_level = "info"   # trace, debug, info, warn, error
log_format = "text"  # text, json

# Server
listen = "127.0.0.1:8731"       # TCP: host:port
# listen = "/run/hyuqueue/hyuqueue.sock"  # Unix domain socket path
# listen = "sd-listen"           # Inherit socket from systemd
# db_path = "hyuqueue.db"  # default: ~/.local/share/hyuqueue/hyuqueue.db
# frontend_path = "frontend/public"  # Path to compiled Elm frontend assets

# OIDC authentication (optional — all four must be set together or all absent)
# base_url = "https://example.com"
# oidc_issuer = "https://sso.example.com/application/o/hyuqueue"
# oidc_client_id = "hyuqueue"
# oidc_client_secret_file = "/run/secrets/hyuqueue-oidc-secret"

# LLM (OpenAI-compatible — point at Ollama or any compatible server)
[llm]
base_url = "http://localhost:11434/v1"
intake_model = "llama3.2"
review_model = "llama3.2"
# api_key = ""  # not needed for Ollama
